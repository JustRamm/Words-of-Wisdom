<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Words of Wisdome</title>
  <meta name="description"
    content="A standalone module to learn empowering terminology and end stigma through an interactive journey." />

  <!-- PWA & Mobile Optimization -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#14b8a6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/stickman_assets/logo.svg" />

  <!-- Preconnect to Google Fonts for Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/stickman_assets/logo.svg" />

</head>

<body class="bg-slate-950 overflow-hidden">
  <div id="root"></div>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW: Registered at', reg.scope))
          .catch(err => console.error('SW: Registration failed', err));
      });
    }
  </script>

  <script type="module" src="./main.jsx"></script>
</body>

</html>
