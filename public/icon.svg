<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="100" fill="url(#paint0_linear)"/>
  
  <!-- Outer Glow -->
  <circle cx="256" cy="256" r="200" fill="white" fill-opacity="0.05"/>
  
  <!-- Stickman Base Stylization -->
  <g transform="translate(256, 260)">
    <!-- Head -->
    <circle cx="0" cy="-100" r="35" stroke="white" stroke-width="8" fill="transparent"/>
    
    <!-- Body -->
    <line x1="0" y1="-65" x2="0" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Arms (Raising hope) -->
    <path d="M-60 -40 Q-30 -50 0 -25 Q30 -50 60 -40" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Legs -->
    <path d="M-40 80 L0 20 L40 80" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- The Wisdom Seed (Heart) -->
    <path d="M0 -35 Q-15 -50 -25 -35 Q-25 -20 0 0 Q25 -20 25 -35 Q15 -50 0 -35" fill="#4fd1c5" />
    <path d="M0 -35 Q-15 -50 -25 -35 Q-25 -20 0 0 Q25 -20 25 -35 Q15 -50 0 -35" stroke="#2dd4bf" stroke-width="2" fill="none" />
  </g>

  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
</svg>
